<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tugas 3: Kalkulator HTML CSS JS</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #2c3e50;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
        }
        .calculator {
            background-color: #1a1a24;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            width: 320px;
        }
        #display {
            width: 100%;
            height: 60px;
            background-color: #2d2d3a;
            border: none;
            outline: none;
            border-radius: 8px;
            color: #ffffff;
            font-size: 2rem;
            text-align: right;
            padding: 0 15px;
            box-sizing: border-box;
            margin-bottom: 20px;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }
        button {
            padding: 18px;
            font-size: 1.25rem;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            background-color: #3a3a4a;
            color: white;
            transition: background 0.2s;
        }
        button:hover { background-color: #4e4e61; }
        button.operator { background-color: #e67e22; color: white; }
        button.operator:hover { background-color: #d35400; }
        button.clear { background-color: #e74c3c; }
        button.clear:hover { background-color: #c0392b; }
        button.equal { grid-column: span 2; background-color: #2ecc71; }
        button.equal:hover { background-color: #27ae60; }
    </style>
</head>
<body>

<div class="calculator">
    <!-- Layar Utama Kalkulator -->
    <input type="text" id="display" readonly placeholder="0">
    
    <!-- Tombol Operasi -->
    <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button onclick="appendValue('/')" class="operator">/</button>
        <button onclick="appendValue('*')" class="operator">x</button>
        <button onclick="appendValue('-')" class="operator">-</button>
        
        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button onclick="appendValue('+')" class="operator">+</button>
        
        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button onclick="appendValue('%')" class="operator">%</button>
        
        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button onclick="calculate()" class="equal">=</button>
        
        <button onclick="appendValue('0')" style="grid-column: span 2;">0</button>
        <button onclick="appendValue('.')">.</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    // Menambah karakter/angka ke display
    function appendValue(val) {
        if (display.value === '0' && !isNaN(val)) {
            display.value = val;
        } else {
            display.value += val;
        }
    }

    // Membersihkan layar (Reset)
    function clearDisplay() {
        display.value = '';
    }

    // Melakukan evaluasi perhitungan matematika matematis aman
    function calculate() {
        try {
            // eval() mengevaluasi string operasi aritmatika langsung (misal: "12+3*5")
            if (display.value) {
                display.value = eval(display.value);
            }
        } catch (error) {
            display.value = 'Error';
        }
    }
</script>

</body>
</html>
