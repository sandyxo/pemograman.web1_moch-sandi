<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percabangan If Else</title>
</head>
<body>

    <script>
        let a = 10;
        let b = 20;

        // contoh if tanpa else
        if (a > b) {
            console.log("a is greater than b");
        }

        // contoh if else
        if (a > b) {
            console.log("a is greater than b");
        } else {
            console.log("a is not greater than b");
        }

        // contoh nested if (menentukan nilai a,b,c,d,e)
        let c = 80;
        if (c >= 90) {
            console.log("nilai A");
        } else if (c >= 80) {
            console.log("nilai B");
        } else if (c >= 70) {
            console.log("nilai C");
        } else if (c >= 60) {
            console.log("nilai D");
        } else {
            console.log("nilai E");
        }
    </script>

</body>
</html>
