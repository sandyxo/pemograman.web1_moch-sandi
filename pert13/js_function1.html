<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dasar-Dasar Function</title>
</head>
<body>

    <script>
        function hello() { // function declaration
            console.log("Hello World");
            alert("Hello World");
            document.write("Hello World<br>");
        }

        hello(); // calling function

        function tambah(a, b) {
            let hasil = a + b;
            console.log(hasil);
        }

        tambah(10, 20);

        // contoh function return value
        function kali(a, b) {
            let hasil = a * b;
            return hasil;
        }

        let result = kali(10, 20);
        console.log(result);
    </script>

</body>
</html>
