<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar JavaScript: Tag Script</title>
</head>
<body>

    <h1>Belajar Tag JavaScript</h1>
    <p>Buka <strong>Developer Tools -> Console</strong> di browser untuk melihat outputnya.</p>

    <!-- Tempat 1: Menulis JavaScript secara Internal di dalam HTML -->
    <script>
        console.log("Halo! Ini script internal yang ditaruh sebelum tag penutup body.");
    </script>

    <!-- Tempat 2: Menghubungkan ke file JavaScript Eksternal (opsional jika ada file terpisah) -->
    <!-- <script src="script.js"></script> -->

</body>
</html>
