<html lang="en">
<head>
    <meta charset="UTF-8">

</head>
<body>

    <script>
        // looping of object mahasiswa 3 data
        let mahasiswa = [
            {
                nim: "123456789",
                nama: "muhammad sandi",
                jurusan: "Informatika",
                fakultas: "Teknik"
            },
            {
                nim: "987654321",
                nama: "bambang",
                jurusan: "Sastra inggris",
                fakultas: "sastra"
            },
            {
                nim: "333333333",
                nama: "shinta wahyu ningsih",
                jurusan: "hukum",
                fakultas: "hukum"
            }
        ];

        console.log(mahasiswa);

        // tampilkan dengan for
        for (let i = 0; i < mahasiswa.length; i++) {
            console.log(`${mahasiswa[i].nama} (${mahasiswa[i].nim}) - ${mahasiswa[i].jurusan}, ${mahasiswa[i].fakultas}`);
        }
    </script>
    
</body>
